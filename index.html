<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCP Quick Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #0f1114;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 0.08em;
      color: #ffffff;
      line-height: 1;
    }

    .header .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.4rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #e05c2d;
      border-radius: 2px;
      margin: 1rem auto 0;
    }

    .links {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #1a1d22;
      border: 1px solid #2a2d33;
      border-radius: 12px;
      padding: 1.1rem 1.2rem;
      text-decoration: none;
      color: #e8e8e8;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .link-card:active {
      transform: scale(0.97);
      background: #22252b;
      border-color: #e05c2d;
    }

    @media (hover: hover) {
      .link-card:hover {
        background: #22252b;
        border-color: #e05c2d;
      }
    }

    .link-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.3rem;
    }

    .icon-camera   { background: #1e3a5f; }
    .icon-clip     { background: #2d4a1e; }
    .icon-box      { background: #5a3a1e; }
    .icon-terminal { background: #3a1e4a; }
    .icon-schedule { background: #1e4a4a; }

    .link-text h2 {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .link-text p {
      font-size: 0.78rem;
      color: #777;
      margin-top: 0.2rem;
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Southern Cast Products</h1>
    <div class="subtitle">Quick Links</div>
    <div class="divider"></div>
  </div>

  <div class="links">

    <a class="link-card" href="http://192.168.2.130:5000/">
      <div class="link-icon icon-camera">📷</div>
      <div class="link-text">
        <h2>Picture Offload</h2>
        <p>Upload photos from the floor</p>

    <a class="link-card" href="https://forms.office.com/Pages/ResponsePage.aspx?id=KflqwYXlSUysvN8mEARovFTfjE5E2q9EquLiSDp6G5VUN04zQ1hCWUdBQUJMMEE3NkwwSVE0SUZIQy4u&origin=QRCode">
      <div class="link-icon icon-clip">📋</div>
      <div class="link-text">
        <h2>Robot Mold Checklist</h2>
        <p>Microsoft Forms checklist</p>
      </div>
    </a>

    <a class="link-card" href="https://accurate-truth-production-25d4.up.railway.app/">
      <div class="link-icon icon-box">📦</div>
      <div class="link-text">
        <h2>Core Inventory</h2>
        <p>Core tracking system</p>
      </div>
    </a>

    <a class="link-card" href="https://southerncast-my.sharepoint.com/:x:/p/nugent/IQB18PkYw7JWSqux05dCffjbAUhx7KJDz-_3Nu_Pd9Vrjfs?e=bbQKa4">
      <div class="link-icon icon-schedule">📅</div>
      <div class="link-text">
        <h2>Robot Schedule</h2>
        <p>Live read-only schedule view</p>
      </div>
    </a>

    <a class="link-card" href="http://scp-sql/DCMobile2/(S(35ldxxe3erpjuqsuqdh2yn4x))/Default.aspx">
      <div class="link-icon icon-terminal">💻</div>
      <div class="link-text">
        <h2>JobBoss Login</h2>
        <p>ERP mobile access</p>
      </div>
    </a>

  </div>

  <div class="footer">SCP Internal Use</div>

</body>
</html>
